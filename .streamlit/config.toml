[theme]
# Streamlit's own widget chrome. Identity colour, from brand.py -- never a
# series colour. Chart palettes come from theme.py and are CVD-validated.
base = "dark"
primaryColor = "#4FB3F5"
backgroundColor = "#0B1020"
secondaryBackgroundColor = "#141B34"
textColor = "#E6EAF5"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 400

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
