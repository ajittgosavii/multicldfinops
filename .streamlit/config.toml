[theme]
base = "dark"
primaryColor = "#22D3EE"
backgroundColor = "#0B1020"
secondaryBackgroundColor = "#141B34"
textColor = "#E6EAF5"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 400

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
